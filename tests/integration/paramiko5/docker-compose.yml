services:
  bastion:
    build: .
    ports:
      - "127.0.0.1:2222:22"
    healthcheck:
      test: ["CMD-SHELL", "ssh-keyscan -T 2 -p 22 127.0.0.1 >/dev/null 2>&1"]
      interval: 2s
      timeout: 3s
      retries: 20

  target:
    build: .
    ports:
      - "127.0.0.1:2223:22"
    healthcheck:
      test: ["CMD-SHELL", "ssh-keyscan -T 2 -p 22 127.0.0.1 >/dev/null 2>&1"]
      interval: 2s
      timeout: 3s
      retries: 20

  target-changed:
    build: .
    ports:
      - "127.0.0.1:2224:22"
    healthcheck:
      test: ["CMD-SHELL", "ssh-keyscan -T 2 -p 22 127.0.0.1 >/dev/null 2>&1"]
      interval: 2s
      timeout: 3s
      retries: 20
